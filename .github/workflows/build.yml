name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # ubuntu-latest ships Docker — Testcontainers works out of the box.

      - name: Build and test
        run: ./gradlew build --no-daemon
        env:
          # Keep the dev-mode API key for tests; SchemaIntegrationTest overrides
          # via @DynamicPropertySource so this value doesn't affect Testcontainers.
          API_KEY: ci-test-key

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 7
