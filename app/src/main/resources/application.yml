spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:career_copilot}
    username: ${POSTGRES_USER:career_copilot}
    password: ${POSTGRES_PASSWORD:change-me}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000

  jpa:
    open-in-view: false
    depends-on: flyway
    hibernate:
      ddl-auto: validate  # Flyway owns the schema — Hibernate must NOT create/alter

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: false

  ai:
    vertex:
      ai:
        gemini:
          project-id: ${VERTEX_PROJECT_ID:career-copilot-dev}
          location: ${VERTEX_LOCATION:us-central1}
          chat:
            options:
              model: ${VERTEX_MODEL:gemini-2.0-flash}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ------------------------------------------------------------------
# Security — API key auth (see ApiKeyAuthFilter)
# For production, set API_KEY env var to a strong random secret.
# ------------------------------------------------------------------
app:
  security:
    api-key: ${API_KEY:copilot-dev-key}
  ai:
    client-type: ${AI_CLIENT_TYPE:mock}   # mock | vertex | openrouter
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:openrouter/free}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  discovery:
    greenhouse:
      use-mock: false

# ------------------------------------------------------------------
# Actuator — only health and info exposed (no sensitive endpoints)
# ------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: AI Career Copilot
    milestone: M1

# ------------------------------------------------------------------
# Automation guardrail defaults (overridden by MasterProfile per user)
# ------------------------------------------------------------------
automation:
  daily-cap: ${AUTOMATION_DAILY_CAP:20}
  autonomy-threshold: ${AUTONOMY_THRESHOLD:0}
  streams:
    jobs-stream: cc:automation:jobs
    results-stream: cc:automation:results
    consumer-group: spring-consumers
    consumer-name: ${HOSTNAME:app-1}
  crawler:
    enabled: true
    startup-delay-ms: ${CRAWLER_STARTUP_DELAY_MS:15000}
    interval-ms: ${CRAWLER_INTERVAL_MS:1800000}
