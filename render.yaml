# Render Blueprint Infrastructure Configuration
services:
  - type: web
    name: career-copilot-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: API_KEY
        generateValue: true
      - key: POSTGRES_HOST
        fromDatabase:
          name: career-copilot-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: career-copilot-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: career-copilot-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: career-copilot-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: career-copilot-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: redis
          name: career-copilot-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: career-copilot-redis
          property: port

  - type: web
    name: career-copilot-frontend
    runtime: static
    staticPublishPath: ./frontend

  - type: redis
    name: career-copilot-redis
    plan: free
    ipAllowList: []

databases:
  - name: career-copilot-db
    plan: free
    databaseName: career_copilot
    user: career_copilot
