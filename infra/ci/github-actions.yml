name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Compile dependency-free Java starter
        run: |
          mkdir -p build/classes
          find app/src/main/java app/src/test/java -name "*.java" > sources.txt
          javac -d build/classes @sources.txt
          java -cp build/classes com.careercopilot.automation.AutonomyPolicySmokeTest
          java -cp build/classes com.careercopilot.generation.GroundednessVerifierSmokeTest
