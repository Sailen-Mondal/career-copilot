services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: career_copilot
      POSTGRES_USER: career_copilot
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
